<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Launch countdown timer</title>
  </head>
  <body>
    <div class="container">
      <h1>We're launching soon</h1>

      <div class="timer">
        <div class="timer-card">
          <div class="timer-value" data-timer="days">14</div>
          <div class="timer-label">Days</div>
        </div>
        <div class="timer-card">
          <div class="timer-value" data-timer="hours">00</div>
          <div class="timer-label">Hours</div>
        </div>
        <div class="timer-card">
          <div class="timer-value" data-timer="minutes">00</div>
          <div class="timer-label">Minutes</div>
        </div>
        <div class="timer-card">
          <div class="timer-value" data-timer="seconds">00</div>
          <div class="timer-label">Seconds</div>
        </div>
      </div>
